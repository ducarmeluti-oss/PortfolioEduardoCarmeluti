<body>

<header>

            </ul>
        </nav>
    </header>

    <main>
        <h1>Entre em Contato</h1>
        <p>Gostaria de entrar em contato comigo? É bem simples, preencha os campos abaixo para me enviar uma mensagem direta. Todos os campos são obrigatórios.</p>
        
        <form id="formContato">
            <div class="form-grupo">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" placeholder="Digite seu nome completo">
            </div>

            <div class="form-grupo">
                <label for="email">E-mail:</label>
                <input type="text" id="email" placeholder="exemplo@dominio.com">
            </div>

            <div class="form-grupo">
                <label for="mensagem">Mensagem:</label>
                <textarea id="mensagem" placeholder="Escreva sua mensagem aqui..."></textarea>
            </div>

            <button type="submit">Enviar Mensagem</button>
        </form>
    </main>

    <script src="script.js"></script>
</body>
</html>
